services:
  - type: web
    name: flowup
    runtime: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && npm --prefix frontend install && npm --prefix frontend run build"
    startCommand: "cd backend && gunicorn app:app"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
